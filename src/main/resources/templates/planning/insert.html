<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau Planning — Back-Office</title>
    <th:block th:replace="~{fragments/sidebar :: sidebarStyles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<main class="main-content">
    <div class="page-title">🗓️ Nouveau planning</div>
    <div class="page-subtitle">Créer un nouveau trajet véhicule</div>

    <div class="form-card">
        <form method="post" th:action="@{/plannings/save}">

            <div class="form-group">
                <label for="vehiculeId">Véhicule</label>
                <select id="vehiculeId" name="vehiculeId" required>
                    <option value="">-- Sélectionner un véhicule --</option>
                    <option th:each="v : ${vehicules}" th:value="${v.id}"
                            th:text="'Véhicule #' + ${v.id} + ' (' + ${v.capacite} + ' places - ' + ${v.typeCarburant.libelle} + ')'"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="hostelId">Hôtel destination</label>
                <select id="hostelId" name="hostelId" required>
                    <option value="">-- Sélectionner un hôtel --</option>
                    <option th:each="h : ${hostels}" th:value="${h.id}"
                            th:text="${h.nom}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="lieuDepartId">Lieu de départ</label>
                <select id="lieuDepartId" name="lieuDepartId" required>
                    <option value="">-- Sélectionner le lieu de départ --</option>
                    <option th:each="l : ${lieux}" th:value="${l.id}"
                            th:text="${l.code + ' - ' + l.nom}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="lieuRetourId">Lieu de retour</label>
                <select id="lieuRetourId" name="lieuRetourId" required>
                    <option value="">-- Sélectionner le lieu de retour --</option>
                    <option th:each="l : ${lieux}" th:value="${l.id}"
                            th:text="${l.code + ' - ' + l.nom}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="dateHeureDepart">Date / Heure de départ</label>
                <input type="datetime-local" id="dateHeureDepart" name="dateHeureDepart" required>
            </div>

            <div class="form-group">
                <label for="heureArriveeHotel">Heure d'arrivée à l'hôtel</label>
                <input type="datetime-local" id="heureArriveeHotel" name="heureArriveeHotel">
            </div>

            <div class="form-group">
                <label for="heureDepartHotel">Heure de départ de l'hôtel</label>
                <input type="datetime-local" id="heureDepartHotel" name="heureDepartHotel">
            </div>

            <div class="form-group">
                <label for="dateHeureRetour">Date / Heure de retour</label>
                <input type="datetime-local" id="dateHeureRetour" name="dateHeureRetour" required>
            </div>

            <div class="form-group">
                <label for="reservationId">Réservation</label>
                <select id="reservationId" name="reservationId" required>
                    <option value="">-- Sélectionner une réservation --</option>
                    <option th:each="r : ${reservations}" th:value="${r.id}"
                            th:text="'#' + ${r.id} + ' - Client ' + ${r.idClient} + ' (' + ${r.nbPassager} + ' passagers, ' + ${#temporals.format(r.dateHeure, 'dd/MM/yyyy HH:mm')} + ')'"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="statut">Statut</label>
                <select id="statut" name="statut" required>
                    <option value="PLANIFIE" selected>Planifié</option>
                    <option value="EN_COURS">En cours</option>
                    <option value="TERMINE">Terminé</option>
                </select>
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button type="submit" class="btn-action btn-primary-action">💾 Enregistrer</button>
                <a th:href="@{/plannings}" class="btn-action btn-secondary-action">← Retour à la liste</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
