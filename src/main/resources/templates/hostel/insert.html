<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvel Hôtel — Back-Office</title>
    <th:block th:replace="~{fragments/sidebar :: sidebarStyles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<main class="main-content">
    <div class="page-title">🏨 Nouvel Hôtel</div>
    <div class="page-subtitle">Ajouter un hôtel desservi par les navettes</div>

    <div class="form-card">
        <form method="post" th:action="@{/hostels/save}">
            <div class="form-group">
                <label for="nom">Nom de l'hôtel</label>
                <input type="text" id="nom" name="nom"
                       placeholder="Ex: Hôtel Madagascar" required>
            </div>

            <div class="form-group">
                <label for="lieuId">Lieu</label>
                <select id="lieuId" name="lieuId" required>
                    <option value="" disabled selected>-- Choisir un lieu --</option>
                    <option th:each="lieu : ${lieux}"
                            th:value="${lieu.id}"
                            th:text="${lieu.code + ' - ' + lieu.nom}">
                    </option>
                </select>
            </div>

            <div style="display:flex; gap:10px; margin-top:24px;">
                <button type="submit" class="btn-action btn-primary-action">💾 Enregistrer</button>
                <a th:href="@{/hostels}" class="btn-action btn-secondary-action">← Annuler</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
