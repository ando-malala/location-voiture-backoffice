<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hôtels — Back-Office</title>
    <th:block th:replace="~{fragments/sidebar :: sidebarStyles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<main class="main-content">
    <div class="page-title">🏨 Hôtels</div>
    <div class="page-subtitle">Gestion des hôtels desservis par les navettes</div>

    <div class="content-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
            <span style="font-weight:600; color:#374151;">Liste des hôtels (<span th:text="${#lists.size(hostels)}">0</span>)</span>
            <a th:href="@{/hostels/new}" class="btn-action btn-primary-action">+ Nouvel hôtel</a>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="h : ${hostels}">
                    <td th:text="${h.id}"></td>
                    <td th:text="${h.nom}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(hostels)}">
                    <td colspan="2" style="text-align:center; color:#9ca3af; padding:32px;">Aucun hôtel trouvé.</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
