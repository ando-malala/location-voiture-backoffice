<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle Réservation — Back-Office</title>
    <th:block th:replace="~{fragments/sidebar :: sidebarStyles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<main class="main-content">
    <div class="page-title">📋 Nouvelle Réservation</div>
    <div class="page-subtitle">Enregistrer une nouvelle réservation de navette</div>

    <div class="form-card">
        <form method="post" th:action="@{/reservations/save}">
            <div class="form-group">
                <label for="idClient">ID Client</label>
                <input type="text" id="idClient" name="idClient"
                       placeholder="Ex: C001" required>
            </div>

            <div class="form-group">
                <label for="nbPassager">Nombre de passagers</label>
                <input type="number" id="nbPassager" name="nbPassager"
                       min="1" placeholder="Ex: 3" required>
            </div>

            <div class="form-group">
                <label for="dateHeure">Date et heure d'arrivée</label>
                <input type="datetime-local" id="dateHeure" name="dateHeure" required>
            </div>

            <div class="form-group">
                <label for="hostelId">Hôtel</label>
                <select id="hostelId" name="hostelId" required>
                    <option value="" disabled selected>-- Choisir un hôtel --</option>
                    <option th:each="h : ${hostels}" th:value="${h.id}"
                            th:text="${h.nom}"></option>
                </select>
            </div>

            <div style="display:flex; gap:10px; margin-top:24px;">
                <button type="submit" class="btn-action btn-primary-action">💾 Enregistrer</button>
                <a th:href="@{/reservations}" class="btn-action btn-secondary-action">← Annuler</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
