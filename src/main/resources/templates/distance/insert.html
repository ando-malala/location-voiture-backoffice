<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle Distance — Back-Office</title>
    <th:block th:replace="~{fragments/sidebar :: sidebarStyles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<main class="main-content">
    <div class="page-title">📍 Nouvelle Distance</div>
    <div class="page-subtitle">Ajouter une distance entre deux hôtels</div>

    <div class="form-card">
        <form method="post" th:action="@{/distances/save}">

            <div class="form-group">
                <label for="hotelDepartId">Hôtel Départ</label>
                <select id="hotelDepartId" name="hotelDepartId" required>
                    <option value="" disabled selected>-- Choisir --</option>
                    <option th:each="h : ${hostels}"
                            th:value="${h.id}"
                            th:text="${h.nom}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="hotelArriveeId">Hôtel Arrivée</label>
                <select id="hotelArriveeId" name="hotelArriveeId" required>
                    <option value="" disabled selected>-- Choisir --</option>
                    <option th:each="h : ${hostels}"
                            th:value="${h.id}"
                            th:text="${h.nom}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="distanceKm">Distance (km)</label>
                <input type="number" id="distanceKm" name="distanceKm" step="0.1" min="0"
                       placeholder="Ex: 12.5" required>
            </div>

            <div style="display:flex; gap:10px; margin-top:24px;">
                <button type="submit" class="btn-action btn-primary-action">💾 Enregistrer</button>
                <a th:href="@{/distances}" class="btn-action btn-secondary-action">← Annuler</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
