<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau Véhicule — Back-Office</title>
    <th:block th:replace="~{fragments/sidebar :: sidebarStyles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<main class="main-content">
    <div class="page-title">🚐 Nouveau Véhicule</div>
    <div class="page-subtitle">Ajouter un véhicule au parc</div>

    <div class="form-card">
        <form method="post" th:action="@{/vehicules/save}">
            <div class="form-group">
                <label for="capacite">Capacité (nombre de passagers)</label>
                <input type="number" id="capacite" name="capacite" min="1" max="100"
                       placeholder="Ex: 8" required>
            </div>

            <div class="form-group">
                <label for="typeCarburantId">Type de carburant</label>
                <select id="typeCarburantId" name="typeCarburantId" required>
                    <option value="" disabled selected>-- Choisir --</option>
                    <option th:each="tc : ${typesCarburant}"
                            th:value="${tc.id}"
                            th:text="${tc.libelle}">
                    </option>
                </select>
            </div>

            <div style="display:flex; gap:10px; margin-top:24px;">
                <button type="submit" class="btn-action btn-primary-action">💾 Enregistrer</button>
                <a th:href="@{/vehicules}" class="btn-action btn-secondary-action">← Annuler</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
