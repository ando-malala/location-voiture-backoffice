<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Véhicule — Back-Office</title>
    <th:block th:replace="~{fragments/sidebar :: sidebarStyles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<main class="main-content">
    <div class="page-title">✏️ Modifier le Véhicule #<span th:text="${vehicule.id}"></span></div>
    <div class="page-subtitle">Mettre à jour les informations du véhicule</div>

    <div class="form-card">
        <form method="post" th:action="@{/vehicules/update}">
            <input type="hidden" name="id" th:value="${vehicule.id}">

            <div class="form-group">
                <label for="capacite">Capacité (nombre de passagers)</label>
                <input type="number" id="capacite" name="capacite" min="1" max="100"
                       th:value="${vehicule.capacite}" required>
            </div>

            <div class="form-group">
                <label for="typeCarburantId">Type de carburant</label>
                <select id="typeCarburantId" name="typeCarburantId" required>
                    <option th:each="tc : ${typesCarburant}"
                            th:value="${tc.id}"
                            th:text="${tc.libelle}"
                            th:selected="${vehicule.typeCarburant != null and vehicule.typeCarburant.id == tc.id}">
                    </option>
                </select>
            </div>

            <div style="display:flex; gap:10px; margin-top:24px;">
                <button type="submit" class="btn-action btn-primary-action">💾 Mettre à jour</button>
                <a th:href="@{/vehicules}" class="btn-action btn-secondary-action">← Annuler</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
